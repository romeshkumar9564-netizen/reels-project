<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Script Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #cbd5e1;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 16px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #334155;
            border-radius: 14px;
            color: #fff;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, #0284c7, #2563eb);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 25px 0;
            color: #38bdf8;
            font-weight: 500;
        }

        .result-box {
            display: none;
            margin-top: 30px;
            padding: 25px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            border-radius: 16px;
            white-space: pre-wrap;
            line-height: 1.6;
            color: #e2e8f0;
            font-size: 1.05rem;
            max-height: 400px;
            overflow-y: auto;
        }

        .error {
            color: #ef4444;
            border-color: #7f1d1d;
            background: rgba(127, 29, 29, 0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Reels Script Generator</h1>
        <p class="subtitle">Enter your topic and get a high-engaging Hinglish script in seconds!</p>

        <div class="input-group">
            <label for="topic">Reel Topic</label>
            <input type="text" id="topicInput" placeholder="e.g., Python Tips, Cyber Security Basics...">
        </div>

        <button id="generateBtn">Generate Script ✨</button>

        <div class="loader" id="loader">Gemini is thinking... Please wait 🧠🤖</div>

        <div class="result-box" id="resultBox"></div>
    </div>

    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const topicInput = document.getElementById('topicInput');
            const generateBtn = document.getElementById('generateBtn');
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');

            const topic = topicInput.value.trim();
            if (!topic) {
                alert('Please enter a topic first, bhai!');
                return;
            }

            // UI Reset
            generateBtn.disabled = true;
            loader.style.display = 'block';
            resultBox.style.display = 'none';
            resultBox.classList.remove('error');
            resultBox.innerHTML = '';

            try {
                // Render Backend URL
                const response = await fetch('https://srv-d8l6p9ugvqtc73akgirg.onrender.com/make-script', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ topic: topic })
                });

                const data = await response.json();

                if (response.ok) {
                    resultBox.innerHTML = data.script;
                    resultBox.style.display = 'block';
                } else {
                    resultBox.innerHTML = `Error: ${data.detail || 'Something went wrong!'}`;
                    resultBox.classList.add('error');
                    resultBox.style.display = 'block';
                }
            } catch (error) {
                resultBox.innerHTML = `Error: Unable to connect to backend. Server starting up or network issue!`;
                resultBox.classList.add('error');
                resultBox.style.display = 'block';
            } finally {
                generateBtn.disabled = false;
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
