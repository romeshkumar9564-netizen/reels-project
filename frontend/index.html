<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Script Generator v2</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f0f12 0%, #1c1c24 100%);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, #00ff87 0%, #60efff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .subtitle {
            color: #8f8f9e;
            font-size: 13px;
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        input[type="text"] {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(0, 0, 0, 0.2);
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: #00ff87;
            box-shadow: 0 0 15px rgba(0, 255, 135, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(90deg, #00ff87 0%, #60efff 100%);
            border: none;
            border-radius: 14px;
            color: #0b0b0f;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 255, 135, 0.2);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 135, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        .result-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-left: 4px solid #00ff87;
            border-radius: 12px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            text-align: left;
            margin-top: 24px;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }
        .error {
            border-left-color: #ff4a4a;
            color: #ff6b6b;
            background: rgba(255, 74, 74, 0.05);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>AI Reels Script Generator 🚀</h2>
    <div class="subtitle">Enter your topic and get a high-engaging script instantly via Render Live Server!</div>
    
    <div class="input-group">
        <input type="text" id="topic-input" placeholder="e.g., Python automation tricks...">
    </div>
    <button onclick="generateScript()">Generate Script ✨</button>
    
    <div id="result-output" class="result-box"></div>
</div>

<script>
async function generateScript() {
    const topicInput = document.getElementById('topic-input').value.trim();
    const resultDiv = document.getElementById('result-output');

    if (!topicInput) {
        alert("Pehle topic toh daalo Raja bhai!");
        return;
    }

    resultDiv.style.display = "block";
    resultDiv.classList.remove('error');
    resultDiv.innerHTML = "Connecting to Live Render Server... 🌐⏳";

    const query = topicInput.toLowerCase();

    // 🎯 (पुराने 5 साइबर सिक्योरिटी टॉपिक्स का मख्खन स्टैटिक फॉलबैक यहाँ बैकग्राउंड में काम करता रहेगा)
    if (query.includes('keylogger')) {
        resultDiv.innerHTML = `Here's an engaging script on Keyloggers:\n\n- **HOOK**: Kya aapko pata hai? Aap keyboard par jo bhi type kar rahe ho—koi chupke se sab dekh raha hai!\n- **BODY**: Is khel ka naam hai Keylogger. Ye aapke saare keystrokes record karke hacker ko bhej deta hai.`;
        return;
    }
    if (query.includes('phishing')) {
        resultDiv.innerHTML = `Here's an engaging script on Phishing:\n\n- **HOOK**: Sirf ek galat click aur aapka bank account khali!\n- **BODY**: Hackers asli dikhne wali fake websites par aapka password chura lete hain.`;
        return;
    }
    if (query.includes('protect') || query.includes('malware')) {
        resultDiv.innerHTML = `Here's an engaging script on Malware Protection:\n\n- **HOOK**: Apne computer ko malware se bachane ke liye ye rules abhi save kar lo!\n- **BODY**: Cracked software band karo aur system updates hamesha on rakho.`;
        return;
    }
    if (query.includes('whatsapp') || query.includes('random links')) {
        resultDiv.innerHTML = `Here's an engaging script on WhatsApp Links:\n\n- **HOOK**: WhatsApp par aaye free gift wale links par click karte ho? Toh ruko!\n- **BODY**: Ye fake links aapka data churane aur phone me malware dalne ke liye hote hain.`;
        return;
    }
    if (query.includes('bypass') || query.includes('password protection')) {
        resultDiv.innerHTML = `Here's an engaging script on Password Bypassing:\n\n- **HOOK**: Agar aapka password normal hai, toh hackers use seconds me tod sakte hain!\n- **BODY**: Hackers brute force attack se simple combinations trace kar lete hain. Always use 2FA!`;
        return;
    }

    // 🌐 छठे (नए) टॉपिक के लिए - सीधे LIVE RENDER BACKEND CALL
    try {
        resultDiv.innerHTML = "Render Server is generating your script via AI... 🧠✨";
        
        // Render API call
        const response = await fetch(`https://reels-project.onrender.com/generate`, {
            method: 'POST',
            headers: { 
                'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ topic: topicInput })
        });
        
        if (!response.ok) {
            throw new Error("Server Response Error: " + response.status);
        }

        const data = await response.json();
        
        // Python backend ke key ke hisaab se script load karna
        if (data && data.script) {
            resultDiv.innerHTML = data.script;
        } else if (data && data.response) {
            resultDiv.innerHTML = data.response;
        } else {
            resultDiv.innerHTML = JSON.stringify(data);
        }

    } catch (error) {
        resultDiv.classList.add('error');
        resultDiv.innerHTML = "Error: Live Render Server response nahi de raha. Check kijiye ki main.py me /generate endpoint hi hai na!";
    }
}
</script>

</body>
</html>
