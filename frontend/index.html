<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Script Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #2d2d2d;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #ffffff;
        }
        p {
            color: #b3b3b3;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #e0e0e0;
        }
        input {
            width: 100%;
            padding: 12px;
            background-color: #3d3d3d;
            border: 1px solid #4d4d4d;
            border-radius: 6px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #00bf63;
        }
        button {
            width: 100%;
            padding: 14px;
            background-color: #00bf63;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #009e52;
        }
        button:disabled {
            background-color: #4d4d4d;
            cursor: not-allowed;
        }
        #resultBox {
            margin-top: 25px;
            padding: 15px;
            background-color: #1a1a1a;
            border-radius: 6px;
            border-left: 4px solid #00bf63;
            text-align: left;
            white-space: pre-wrap;
            display: none;
            font-size: 14px;
            line-height: 1.6;
        }
        #errorBox {
            margin-top: 25px;
            padding: 15px;
            background-color: #8b0000;
            border-radius: 6px;
            text-align: left;
            display: none;
            font-size: 14px;
            color: #ffcccc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Reels Script Generator</h1>
        <p>Enter your topic and get a high-engaging Hinglish script in seconds!</p>
        
        <div class="form-group">
            <label for="topicInput">Reel Topic</label>
            <input type="text" id="topicInput" placeholder="e.g., How Hackers Steal Passwords...">
        </div>
        
        <button id="generateBtn" onclick="generateScript()">Generate Script ✨</button>
        
        <div id="resultBox"></div>
        <div id="errorBox"></div>
    </div>

    <script>
        async def generateScript() {
            const topicInput = document.getElementById('topicInput').value.trim();
            const generateBtn = document.getElementById('generateBtn');
            const resultBox = document.getElementById('resultBox');
            const errorBox = document.getElementById('errorBox');
            
            if (!topicInput) {
                alert('Please enter a topic first!');
                return;
            }
            
            // UI States
            generateBtn.disabled = true;
            generateBtn.innerText = 'Generating Magic... ⏳';
            resultBox.style.display = 'none';
            errorBox.style.display = 'none';
            
            try {
                // Connecting directly to your Render Live Backend
                const response = await fetch('https://reels-project.onrender.com/make-script', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    box-sizing: 'border-box',
                    body: JSON.stringify({ topic: topicInput })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    resultBox.innerText = data.script;
                    resultBox.style.display = 'block';
                    generateBtn.innerText = 'Generate Script ✨';
                    generateBtn.disabled = false;
                    
                    // Celebration Pop!
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                } else {
                    throw new Error(data.detail || 'Something went wrong');
                }
                
            } catch (err) {
                errorBox.innerText = 'Error: ' + err.message;
                errorBox.style.display = 'block';
                generateBtn.innerText = 'Generate Script ✨';
                generateBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
