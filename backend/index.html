<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Script Generator ✨</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        .container { 
            background-color: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        h2 { 
            text-align: center; 
            color: #38bdf8; 
            margin-bottom: 25px; 
            font-size: 28px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #cbd5e1; 
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #475569; 
            background-color: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            margin-top: 10px; 
        }
        button:hover { 
            background-color: #1d4ed8; 
        }
        button:disabled { 
            background-color: #64748b; 
            cursor: not-allowed; 
        }
        #outputBox { 
            margin-top: 25px; 
            padding: 20px; 
            background-color: #0f172a; 
            border-left: 4px solid #38bdf8; 
            border-radius: 6px; 
            white-space: pre-wrap; 
            display: none; 
            line-height: 1.6;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Reels Script Generator ✨</h2>
        
        <div class="form-group">
            <label>Video Topic / Niche:</label>
            <input type="text" id="topicInput" placeholder="e.g., How hackers bypass basic passwords...">
        </div>

        <div class="form-group">
            <label>Video Duration:</label>
            <select id="durationInput">
                <option value="15 Seconds">15 Seconds</option>
                <option value="30 Seconds" selected>30 Seconds</option>
                <option value="60 Seconds">60 Seconds</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tone of Voice:</label>
            <select id="toneInput">
                <option value="Energetic & Aggressive">Energetic & Aggressive</option>
                <option value="Calm & Informative">Calm & Informative</option>
                <option value="Humorous & Witty">Humorous & Witty</option>
            </select>
        </div>

        <button id="generateBtn" onclick="generateScript()">Generate Script ✨</button>

        <div id="outputBox"></div>
    </div>

    <script>
        // Aapki original original key pehle se hi set kar di hai bhai
        const API_KEY = "AQ.Ab8RN6Jz2At2SRyPGmbG74QYUXiuNnzFtCAP9jG48HMEvvQJ3A";

        async function generateScript() {
            const topicInput = document.getElementById('topicInput').value.trim();
            const durationInput = document.getElementById('durationInput').value;
            const toneInput = document.getElementById('toneInput').value;
            const btn = document.getElementById('generateBtn');
            const outputBox = document.getElementById('outputBox');

            if (!topicInput) {
                alert("Pehle koi topic toh daalo, bhai!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Generating Script...";
            outputBox.style.display = "none";

            const prompt = `Create a high-engaging viral Instagram Reel script. Topic/Niche: ${topicInput}, Duration: ${durationInput}, Tone of Voice: ${toneInput}. Include visual cues and voiceover text.`;

            // Stable v1 Endpoint with Google's latest gemini-2.5-flash model
            const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    outputBox.style.display = "block";
                    outputBox.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    alert("Google API Error: " + (data.error?.message || "Kuch dikkat hai. Key ya model check karein!"));
                }
            } catch (error) {
                alert("Network Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Script ✨";
            }
        }
    </script>
</body>
</html>
