<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Reels Script Generator ✨</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc; 
            max-width: 650px; 
            margin: 40px auto; 
            padding: 20px; 
        }
        .container { 
            background-color: #1e293b; 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); 
        }
        h2 { 
            text-align: center; 
            color: #38bdf8; 
            margin-bottom: 25px; 
            font-size: 28px;
        }
        .form-group { 
            margin-bottom: 20px; 
        }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #cbd5e1; 
        }
        input, select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #475569; 
            background-color: #0f172a; 
            color: white; 
            box-sizing: border-box; 
            font-size: 15px;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
        }
        button { 
            width: 100%; 
            padding: 14px; 
            background-color: #2563eb; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: background 0.2s; 
            margin-top: 10px; 
        }
        button:hover { 
            background-color: #1d4ed8; 
        }
        button:disabled { 
            background-color: #64748b; 
            cursor: not-allowed; 
        }

        /* 🌀 LOADING WHEEL (SPINNER) CSS */
        .loader-container {
            display: none; 
            justify-content: center;
            align-items: center;
            margin-top: 25px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #475569; 
            border-top: 5px solid #38bdf8; 
            border-radius: 50%;
            animation: spin 1s linear infinite; 
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 📝 OUTPUT & BUTTONS CONTAINER */
        .output-container {
            display: none;
            margin-top: 25px;
        }
        #outputBox { 
            padding: 20px; 
            background-color: #0f172a; 
            border-left: 4px solid #38bdf8; 
            border-radius: 6px; 
            white-space: pre-wrap; 
            line-height: 1.6;
            font-size: 15px;
        }

        /* 🔢 COUNTER BOX STYLE */
        .counter-box {
            display: flex;
            justify-content: space-between;
            background-color: #0f172a;
            padding: 8px 12px;
            font-size: 13px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            border-radius: 6px 6px 0 0;
        }

        /* 📋 ACTION BUTTONS STYLE */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .btn-action {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            background-color: #334155;
            border: 1px solid #475569;
        }
        .btn-action:hover {
            background-color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Reels Script Generator ✨</h2>
        
        <div class="form-group">
            <label>Video Topic / Niche:</label>
            <input type="text" id="topicInput" placeholder="e.g., How hackers bypass basic passwords...">
        </div>

        <div class="form-group">
            <label>Video Duration:</label>
            <select id="durationInput">
                <option value="15 Seconds">15 Seconds</option>
                <option value="30 Seconds" selected>30 Seconds</option>
                <option value="60 Seconds">60 Seconds</option>
            </select>
        </div>

        <div class="form-group">
            <label>Tone of Voice:</label>
            <select id="toneInput">
                <option value="Energetic & Aggressive">Energetic & Aggressive</option>
                <option value="Calm & Informative">Calm & Informative</option>
                <option value="Humorous & Witty">Humorous & Witty</option>
            </select>
        </div>

        <button id="generateBtn" onclick="generateScript()">Generate Script ✨</button>

        <div class="loader-container" id="loadingLoader">
            <div class="spinner"></div>
        </div>

        <div class="output-container" id="outputWrapper">
            <div class="counter-box">
                <span id="wordCount">Words: 0</span>
                <span id="charCount">Characters: 0</span>
            </div>
            <div id="outputBox"></div>
            
            <div class="action-buttons">
                <button class="btn-action" id="copyBtn" onclick="copyToClipboard()">📋 Copy Script</button>
                <button class="btn-action" onclick="downloadScript()">📥 Download .txt</button>
            </div>
        </div>
    </div>

    <script>
        // Aapki original API key
        const API_KEY = "AQ.Ab8RN6Jz2At2SRyPGmbG74QYUXiuNnzFtCAP9jG48HMEvvQJ3A";

        async function generateScript() {
            const topicInput = document.getElementById('topicInput').value.trim();
            const durationInput = document.getElementById('durationInput').value;
            const toneInput = document.getElementById('toneInput').value;
            const btn = document.getElementById('generateBtn');
            const outputWrapper = document.getElementById('outputWrapper');
            const outputBox = document.getElementById('outputBox');
            const loader = document.getElementById('loadingLoader');

            if (!topicInput) {
                alert("Pehle koi topic toh daalo, bhai!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Generating Script...";
            outputWrapper.style.display = "none";
            loader.style.display = "flex"; 

            const prompt = `Create a high-engaging viral Instagram Reel script. Topic/Niche: ${topicInput}, Duration: ${durationInput}, Tone of Voice: ${toneInput}. Include visual cues and voiceover text.`;
            const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${API_KEY}`;

            try {
                const response = await fetch(URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                loader.style.display = "none";

                if (response.ok) {
                    const scriptText = data.candidates[0].content.parts[0].text;
                    
                    // Display Output Wrapper
                    outputWrapper.style.display = "block";
                    outputBox.innerText = scriptText;

                    // Update Counters 🔢
                    updateCounters(scriptText);

                } else {
                    alert("Google API Error: " + (data.error?.message || "Kuch dikkat hai. Key ya model check karein!"));
                }
            } catch (error) {
                loader.style.display = "none"; 
                alert("Network Error: " + error.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "Generate Script ✨";
            }
        }

        // 🔢 Counter Function
        function updateCounters(text) {
            const charCount = text.length;
            const words = text.trim().split(/\s+/).filter(word => word.length > 0);
            const wordCount = words.length;

            document.getElementById('charCount').innerText = `Characters: ${charCount}`;
            document.getElementById('wordCount').innerText = `Words: ${wordCount}`;
        }

        // 📋 Copy to Clipboard Function
        function copyToClipboard() {
            const scriptText = document.getElementById('outputBox').innerText;
            const copyBtn = document.getElementById('copyBtn');
            
            navigator.clipboard.writeText(scriptText).then(() => {
                copyBtn.innerText = "✅ Copied!";
                setTimeout(() => {
                    copyBtn.innerText = "📋 Copy Script";
                }, 2000);
            }).catch(err => {
                alert("Copy nahi ho paya, manually select karein!");
            });
        }

        // 📥 Download as .txt File Function
        function downloadScript() {
            const scriptText = document.getElementById('outputBox').innerText;
            const topic = document.getElementById('topicInput').value.trim() || "reels-script";
            
            const element = document.createElement("a");
            const file = new Blob([scriptText], {type: 'text/plain'});
            element.href = URL.createObjectURL(file);
            element.download = `${topic.replace(/\s+/g, '_')}_script.txt`;
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    </script>
</body>
</html>
